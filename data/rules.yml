version: "3.1"

rules:
- rule: Greet the user
  steps:
    - intent: greet
    - action: utter_greet

- rule: Say goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: Answer bot challenge
  steps:
    - intent: bot_challenge
    - action: utter_iamabot

- rule: Respond to thanks
  steps:
    - intent: thank_you
    - action: utter_thank_you

- rule: Explain capabilities
  steps:
    - intent: ask_capabilities
    - action: utter_capabilities

- rule: Answer FAQs with response selector
  steps:
    - intent: faq
    - action: utter_faq

- rule: Query knowledge base
  steps:
    - intent: ask_knowledge_base
    - action: action_query_knowledge_base

- rule: Handle out of scope
  steps:
    - intent: out_of_scope
    - action: utter_out_of_scope

- rule: Fallback when NLU confidence is low
  steps:
    - intent: nlu_fallback
    - action: action_query_knowledge_base
